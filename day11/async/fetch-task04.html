<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch task 04</title>
  </head>
  <body>
    <ul id="result"></ul>
  </body>
  <script>
    // https://jsonplaceholder.typicode.com/users
    // city, zipcode
    // city만 화면에 list로 출력하고
    // zipcode의 번호 앞글자 6자리로 글자의 색상으로 지정하기
    const result = document.querySelector("#result");

    // 데이터 가져오기
    getUserDatas = async () => {
      const response = await fetch(
        "https://jsonplaceholder.typicode.com/users",
      );
      const userDatas = await response.json();

      // 도시 리스트 및 zipcode, colorcode 추출
      const cityList = userDatas.map((data) => data.address.city);
      const zipcodeList = userDatas.map((data) => data.address.zipcode);
      const colorCodeList = zipcodeList.map((zipcode) =>
        zipcode.replace("-", "").slice(0, 6),
      );

      // 5자리면 뒤에 0 첨가
      colorCodeList.forEach((color, i, arr) => {
        if (color.length < 6) {
          arr[i] = color + "0";
          console.log(color);
        }
      });

      cityList.forEach((city, i) => {
        const cityLi = document.createElement("li");
        cityLi.innerText = city;
        cityLi.style.color = `#${colorCodeList[i]}`;
        result.appendChild(cityLi);
      });

      // console.log(cityList);
      console.log(colorCodeList);
    };

    getUserDatas();
  </script>
</html>
