<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUPPLY SEOUL</title>
    <style>
      .list {
        margin-bottom: 20px;
        width: 500px;
        height: 200px;
        border: solid 2px grey;
        border-radius: 10px;
        padding: 14px;
        background-color: rgb(237, 236, 236);
      }

      .title-text {
        font-size: 25px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div>
      <ul id="result">
        <!-- 해당 부분에 추가가 되는 구조 -->
      </ul>
    </div>
  </body>
  <script>
    // https://jsonplaceholder.typicode.com/todos
    // todos의 데이터 중 완료되지 않은 것 중
    // title에 "q"와 "p"가 들어간 타이틀을 조회. 해당 타이틀 뒤에서 5번째 글자를 가져오기
    // 글자 중 가장 많은 알파벳을 result에 출력하기

    const result = document.querySelector("#result");

    const getTodosData = async () => {
      const response = await fetch(
        "https://jsonplaceholder.typicode.com/todos",
      );
      const todos = await response.json();
      // console.log(todos);

      // 완료되지 아니한거 중에서 제목에 q 나 p 가 들어간거 찾기
      const filteredTodos = todos
        .filter(({ completed }) => !completed)
        .filter(({ title }) => title.includes("q") || title.includes("p"));
      // console.log(filteredTodos);

      filteredTodos.forEach(({ title }) => {
        // 공백 없애기
        const definedTitle = title.split(" ").join("");
        const back5Char = definedTitle[definedTitle.length - 5];

        const divBlock = document.createElement("li");
        divBlock.setAttribute("class", "list");
        const topTitle = document.createElement("div");
        topTitle.setAttribute("class", "title-text");
        const alphabet = document.createElement("div");
        const manyAlpha = document.createElement("div");

        topTitle.innerText = title;
        // 타이틀 뒤에서 5번째 글자 가져오기
        alphabet.innerText = `뒤에서 5번째 알파벳: ${back5Char}`;

        const alphaNumObj = new Object();
        let maxAlpha = "";
        let maxAlphaCount = 0;
        let maxMessage = "";

        // console.log(definedTitle, back5Char);
        // 가장 많은 알파벳 찾아서 객체로 해결
        definedTitle.split("").forEach((c) => {
          // alphaNumObj[c] = alphaNumObj[c] === NaN ? 0 : alphaNumObj[c] + 1;
          alphaNumObj[c] = alphaNumObj[c] + 1 ? alphaNumObj[c] + 1 : 1;
        });

        for (let key in alphaNumObj) {
          if (alphaNumObj[key] > maxAlphaCount) {
            maxAlphaCount = alphaNumObj[key];
            maxAlpha = key;
          }
        }

        maxMessage = `가장 많은 알파벳은 ${maxAlpha}`;

        // 동명이인
        for (let key in alphaNumObj) {
          if (alphaNumObj[key] === maxAlphaCount && maxAlpha !== key) {
            maxMessage += ` ,${key}`;
          }
        }

        maxMessage += ` 갯수: ${maxAlphaCount}개`;

        // console.log(alphaNumObj);

        divBlock.appendChild(topTitle);
        divBlock.appendChild(alphabet);

        manyAlpha.innerText = maxMessage;
        divBlock.appendChild(manyAlpha);

        result.appendChild(divBlock);
      });
    };

    getTodosData();
  </script>
</html>
