<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가장 많은 알파벳은?</title>
  </head>
  <body>
    <p id="result"></p>
  </body>
  <script>
    // https://jsonplaceholder.typicode.com/todos
    // todos의 데이터 중 완료되지 않은 것 중
    // title에 "q"와 "p"가 들어간 타이틀을 조회. 해당 타이틀 뒤에서 5번째 글자를 가져오기
    // 글자 중 가장 많은 알파벳을 result에 출력하기

    const result = document.querySelector("#result");

    const getTodosDatas = async () => {
      const response = await fetch(
        "https://jsonplaceholder.typicode.com/todos",
      );
      const todosDatas = await response.json();

      const completedTodos = todosDatas.filter((todo) => !todo.completed);
      const qpTitle = completedTodos.map((todo) => todo.title);

      // 해당 배열은 title 에 q 나 p 가 들어간 타이틀
      const filteredTitle = qpTitle.filter(
        (todo) => todo.includes("q") || todo.includes("p"),
      );

      // 해당 각각 타이틀 뒤에서 5번째 글자 가져오기
      // 글자 중 가장 많은 알파벳은?
      filteredTitle.forEach((title) => {
        // 뒤에서 5번째
        const refinedTitle = title.split(" ").join("");
        console.log(refinedTitle);

        const len = refinedTitle.replace(" ", "").length;
        const back5Char = refinedTitle.replace(" ", "")[len - 5];

        const titleDiv = document.createElement("div");
        const div = document.createElement("div");
        div.innerText = `뒤에서 5번째: ${back5Char} // `;

        // 가장 많은 알파벳 찾기
        const abcdStr = "abcdefghijklmnopqrstuvwxyz";

        // 빈 알파벳 객체 만들기
        const alphaObj = new Object();
        abcdStr.split("").forEach((char) => (alphaObj[char] = 0));

        // 각 타이틀 별로 알파벳이 각각 몇개인지
        refinedTitle
          .replace(" ", "")
          .split("")
          .forEach((char) => {
            alphaObj[char] += 1;
          });

        // 여기서 가장 알파벳 수가 많은거 찾기
        let maxAlphaCount = 0;
        let maxAlpha = "";

        // console.log(title);

        for (let key in alphaObj) {
          // console.log(key, alphaObj[key]);
          if (alphaObj[key] > maxAlphaCount) {
            maxAlphaCount = alphaObj[key];
            maxAlpha = key;
          }
        }

        // console.log(maxAlphaCount);
        // console.log(maxAlpha);
        titleDiv.innerText = `대상 제목: ${title}`;

        div.innerText += `가장 많은 알파벳: ${maxAlpha}`;

        // 그리고 추가 적으로 가장 많은 다른 알파벳 찾기
        for (let key in alphaObj) {
          const alphaCount = alphaObj[key];
          if (key !== maxAlpha && maxAlphaCount === alphaCount) {
            div.innerText += ` ,${key}`;
          }
        }

        div.innerText += `, ${maxAlphaCount}개`;
        div.style.paddingBottom = "16px";

        result.appendChild(titleDiv);
        result.appendChild(div);

        // console.log(alphaObj);
      });

      // console.log(filteredTitle);
    };

    getTodosDatas();
  </script>
</html>
